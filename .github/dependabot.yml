version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    groups:
      uv-security:
        applies-to: security-updates
        patterns:
          - "*"
      uv-non-security:
        applies-to: version-updates
        patterns:
          - "*"
